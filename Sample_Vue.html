<html>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="Content-Language" content="zh-TW">
        <meta name="viewport" content="width=device-width, initial-scale=1,maximum-scale=1.0, user-scalable=yes">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="format-detection" content="telephone=no">
        <meta name="renderer" content="webkit|ie-comp|ie-stand">
        <meta name="description" content="綠界科技 ECPay 提供信用卡刷卡、超商代收及取貨付款、ATM轉帳...等多種金流收款服務，會員可於綠界網站建立收款網址或使用API程式串接，應用彈性，收款隔日起即撥款。支付找綠界，買賣無國界。"><!-- 必填，限制 81-150 字 -->
        <meta name="keywords" content="信用卡,ATM轉帳,超商代碼,超商條碼,applepay,googlepay,samsungpay,金流服務">
        <title>綠界科技 ECPay - 第三方支付領導品牌</title>
    </head>
<body>
    <div id="app">
        <div class="order-info">
            <div class="oi-lan-box">
                <div class="oi-lan" style="text-align: right;">
                    <select id="Language" v-model="language" @change="onLanguageChange">
                        <option value="zh-TW">繁體中文</option>
                        <option value="en-US">English</option>
                    </select>
                </div>
            </div>
            <div id="ECPayPayment">
                <div v-for="(err, index) in errors" :key="index" style="text-align: center;">
                    <label style="color: red;">{{ err }}</label>
                </div>
            </div><br/>

            <form action="" id="PayProcess" method="post">
                <div style="text-align: center;">
                    <input id="PaymentType" name="PaymentType" type="hidden" :value="paymentType" />
                    <input id="btnPay" type="button" class="btn single btn-gray-dark" value="確認付款" @click="onPay" />
                </div>
                <br/>
                <div style="text-align: center;">
                    消費者選擇付款方式取得的PayToken : <input id="PayToken" name="PayToken" type="Text" size="50" v-model="payToken" />
                </div>
            </form>
        </div>
    </div>
</body>

</html>
<!-- 綠界科技 ECPay SDK 需引用JS 區塊 -->
<script src="https://cdn.jsdelivr.net/npm/node-forge@0.7.0/dist/forge.min.js"></script>
<script src="https://ecpg.ecpay.com.tw/Scripts/sdk-1.0.0.js?t=20210121100116"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<script type="text/javascript">
    const { createApp } = Vue;

    createApp({
        data() {
            return {
                language: 'zh-TW',
                payToken: '',
                paymentType: '',
                errors: [],
                _token: '9cbf8fac271b475bae42cbe6aea8a9cc' //請設定你取到的廠商驗證碼
            };
        },
        mounted() {
            var Environment = 'STAGE'; //請設定要連線的環境: 測試 STAGE ,正式PROD
            var envi = GetEnvi(Environment);

            //初始化SDK畫面
            ECPay.initialize(envi, 1, (errMsg) => {

                if (this._token === '') {
                    this._token = prompt('請填入Token: ');
                }

                try {
                    ECPay.createPayment(this._token, ECPay.Language.zhTW, (errMsg) => {
                        //console.log('Callback Message: ' + errMsg);
                        if (errMsg != null)
                            this.errHandle(errMsg);
                    }, 'V2');
                    this.language = ECPay.Language.zhTW;
                } catch (err) {
                    this.errHandle(err);
                }
            });
        },
        methods: {
            onLanguageChange() {
                try {
                    ECPay.createPayment(this._token, this.language, (errMsg) => {
                        //console.log('Callback Message: ' + errMsg);
                        if (errMsg != null)
                            this.errHandle(errMsg);
                    }, 'V2');
                } catch (err) {
                    this.errHandle(err);
                }
            },
            onPay() {
                try {
                    ECPay.getPayToken((paymentInfo, errMsg) => {
                        //console.log("response => getPayToken(paymentInfo, errMsg):", paymentInfo, errMsg);
                        if (errMsg != null) {
                            this.errHandle(errMsg);
                            return;
                        }
                        this.payToken = paymentInfo.PayToken;

                        //document.getElementById('PayProcess').submit();
                        return true;
                    });
                } catch (err) {
                    // this.errHandle(err);
                }

                return false;
            },
            errHandle(strErr) {
                this.errors = [];
                if (strErr != null) {
                    this.errors.push(strErr);
                    console.log(strErr);
                } else {
                    this.errors.push('Token取得失敗');
                    console.log('Wrong');
                }

                //$('#btnPay').hide();
            }
        }
    }).mount('#app');

    function GetEnvi(env) {
        var result = 'STAGE';
        switch (env) {
            case 'STAGE':
                result = 'Stage';
                break;
            case 'PROD':
                result = 'Prod';
                break;
        }
        return result;
    }
</script>
